<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Price Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap');
  :root{
    color-scheme:light;
    --serif:'Cormorant Garamond','Noto Serif TC',Georgia,'Times New Roman',serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --bg:#cdd2d6;
    --card:#f7f6f2;
    --paper:#eceae3;
    --ink:#15171a;
    --ink-soft:#2e3238;
    --muted:#7d8186;
    --line:#a4abb1;
    --hair:#d8d6cd;
    --accent:#9a322b;
    --good:#15171a;
    --good-bg:#b9bfc4;
    --promo:#9a322b;
    --warn:#9a322b;
    --tag-bg:#f1e3e0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
    font-size:15px;line-height:1.5;padding:0 0 40px;
    -webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1,'ss01' 1;}

  /* ─── header ─── */
  header{position:sticky;top:0;z-index:20;background:var(--card);
    padding:26px 22px 20px;border-bottom:1px solid var(--ink);}
  header h1{margin:0;font-family:var(--serif);font-size:34px;font-weight:600;
    letter-spacing:-.005em;line-height:1;color:var(--ink);}
  header h1 em{font-style:italic;font-weight:400;color:var(--accent);}
  header .tag{margin:10px 0 0;font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.28em;font-weight:600;
    display:flex;align-items:center;gap:10px;}
  header .tag::before,header .tag::after{content:'';flex:1;height:1px;background:var(--line);}

  .pad{padding:22px 18px 0;}

  /* ─── entry card ─── */
  .entry{background:var(--card);border:1px solid var(--line);padding:22px 20px;}
  .entry > label{display:block;font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.22em;font-weight:700;
    margin-bottom:12px;}
  .amt-row{display:flex;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);}
  .amt-wrap{position:relative;flex:1;}
  .amt-wrap span{position:absolute;left:0;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:20px;font-weight:400;font-family:var(--serif);font-style:italic;}
  #amt{width:100%;font-family:var(--sans);font-size:26px;font-weight:600;
    padding:14px 12px 14px 22px;border:0;background:transparent;color:var(--ink);
    -webkit-appearance:none;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
  #amt:focus{outline:none;}
  #plusBtn{border:0;border-left:1px solid var(--ink);border-right:1px solid var(--ink);
    background:var(--paper);color:var(--ink);
    font-size:22px;font-weight:600;padding:0 16px;cursor:pointer;
    font-family:var(--sans);line-height:1;}
  #plusBtn:active{background:var(--ink);color:var(--card);}
  #addBtn{border:0;background:var(--ink);color:var(--card);
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.24em;
    padding:0 22px;cursor:pointer;font-family:var(--sans);}
  #addBtn:active{background:var(--accent);}
  .running{font-size:13px;color:var(--accent);font-weight:700;
    font-variant-numeric:tabular-nums;padding:0 0 12px;
    display:flex;align-items:center;gap:10px;letter-spacing:.01em;}
  .running:empty{display:none;}
  .running .parts{color:var(--muted);font-weight:500;font-size:11.5px;
    font-family:var(--serif);font-style:italic;letter-spacing:0;}
  .running .clr-run{background:none;border:0;color:var(--muted);
    font-size:9.5px;text-transform:uppercase;letter-spacing:.22em;cursor:pointer;
    font-family:var(--sans);font-weight:700;padding:2px 0;margin-left:auto;}

  /* ─── live preview ─── */
  #live{margin-top:18px;}
  .live-box{border-top:1px solid var(--hair);padding-top:16px;}
  .live-top{display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:10px;gap:14px;}
  .live-top > div:first-child{flex:1;min-width:0;}
  .live-top .lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.18em;font-weight:600;display:block;margin-bottom:6px;}
  .live-top .v{font-family:var(--sans);font-size:34px;font-weight:700;
    color:var(--ink);line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .live-top .rmb{font-family:var(--sans);font-size:16px;color:var(--accent);
    font-weight:600;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .live-brk{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:10px;
    font-size:11.5px;color:var(--muted);line-height:1.6;}
  .live-brk span{font-weight:500;}
  .live-brk b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;}
  .live-brk .s{font-size:10.5px;font-family:var(--sans);font-weight:600;
    color:var(--ink-soft);letter-spacing:.01em;font-variant-numeric:tabular-nums;}
  .pin{margin-top:16px;width:100%;border:1px solid var(--ink);
    background:transparent;color:var(--ink);
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.24em;
    padding:13px;cursor:pointer;font-family:var(--sans);}
  .pin:active{background:var(--ink);color:var(--card);}

  /* ─── section label ─── */
  .section-label{font-size:9.5px;color:var(--muted);font-weight:700;
    letter-spacing:.28em;text-transform:uppercase;margin:36px 4px 14px;
    display:flex;align-items:center;gap:12px;}
  .section-label .ttl{order:-1;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .section-label #clearBtn{order:1;border:0;background:none;color:var(--accent);
    font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;
    cursor:pointer;font-family:var(--sans);padding:4px 0;}
  .section-label #clearBtn.hidden{display:none;}
  .section-label em{font-family:var(--serif);font-style:italic;font-weight:400;
    text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink-soft);
    margin-left:4px;}

  /* ─── saved cards ─── */
  .rcard{background:var(--card);border:1px solid var(--line);margin-bottom:14px;}
  .rcard-head{display:flex;justify-content:space-between;align-items:center;
    padding:10px 16px;border-bottom:1px solid var(--hair);}
  .rcard-head .num{font-family:var(--serif);font-size:14px;font-style:italic;
    color:var(--muted);letter-spacing:.02em;font-weight:500;}
  .rcard-head .num b{color:var(--ink);font-weight:600;font-style:normal;
    font-family:var(--sans);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;margin-right:4px;}
  .rcard-head .del{border:0;background:none;color:var(--accent);
    font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;
    padding:4px 6px;cursor:pointer;font-family:var(--sans);}
  .rcard .top{display:flex;justify-content:space-between;align-items:flex-end;
    padding:18px 16px 16px;gap:14px;}
  .rcard .spent{flex:1;min-width:0;}
  .rcard .spent .lbl,.rcard .saved-box .lbl{font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.18em;font-weight:600;
    display:block;margin-bottom:5px;}
  .rcard .spent b{display:block;font-family:var(--sans);font-size:24px;
    font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .rcard .saved-box{text-align:right;}
  .rcard .saved-box .v{font-family:var(--sans);font-size:17px;font-weight:600;
    color:var(--accent);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .rcard .saved-box .v .pc{font-size:12px;opacity:.75;font-weight:500;margin-left:3px;letter-spacing:0;}
  .rcard .breakdown{padding:8px 16px 14px;border-top:1px solid var(--hair);}
  .brow{display:flex;justify-content:space-between;align-items:baseline;
    font-size:12.5px;padding:7px 0;border-bottom:1px dotted var(--hair);gap:12px;}
  .brow:last-child{border-bottom:0;}
  .brow .k{color:var(--ink-soft);font-weight:500;flex:1;min-width:0;}
  .brow .val{font-variant-numeric:tabular-nums;font-weight:600;color:var(--accent);
    font-family:var(--sans);font-size:13px;white-space:nowrap;letter-spacing:-.01em;}
  .brow .k .s{font-size:11.5px;font-weight:600;margin-left:6px;
    font-family:var(--sans);color:var(--ink-soft);font-style:normal;
    letter-spacing:.01em;font-variant-numeric:tabular-nums;}
  .rcard .final{background:var(--good-bg);padding:18px 16px 20px;text-align:center;
    border-top:1px solid var(--line);position:relative;}
  .rcard .final::before,.rcard .final::after{content:'';position:absolute;
    left:50%;transform:translateX(-50%);width:24px;height:1px;background:var(--ink);}
  .rcard .final::before{top:10px;}
  .rcard .final .lbl{font-size:9.5px;color:var(--ink);text-transform:uppercase;
    letter-spacing:.28em;font-weight:700;margin-top:6px;margin-bottom:6px;}
  .rcard .final .v{font-family:var(--sans);font-size:38px;font-weight:700;
    color:var(--ink);line-height:1;letter-spacing:-.025em;font-variant-numeric:tabular-nums;}
  .rcard .final .rmb{font-family:var(--sans);font-size:14px;color:var(--accent);
    font-weight:600;margin-top:8px;font-variant-numeric:tabular-nums;}
  .rcard .final .fx{font-size:9.5px;color:var(--muted);font-weight:600;
    margin-left:8px;letter-spacing:.18em;text-transform:uppercase;
    font-family:var(--sans);font-style:normal;}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:46px 10px;
    font-style:italic;font-family:var(--serif);}

  /* ─── settings ─── */
  details{background:var(--card);border:1px solid var(--line);margin-top:18px;}
  summary{list-style:none;padding:16px 18px;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.26em;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;
    font-family:var(--sans);}
  summary::-webkit-details-marker{display:none;}
  summary .arr{color:var(--muted);font-size:16px;font-weight:400;transition:transform .2s;
    font-family:var(--serif);letter-spacing:0;}
  details[open] summary .arr{transform:rotate(180deg);}
  details[open] summary{border-bottom:1px solid var(--hair);}
  .setting{padding:8px 18px 22px;}
  .setting label{display:block;font-size:9.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.2em;font-weight:600;
    margin:18px 0 7px;}
  .field{position:relative;}
  .field .pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-family:var(--serif);font-size:15px;font-style:italic;}
  .field .suf{position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:13px;}
  .setting input,.setting select{width:100%;font-size:15px;padding:11px 13px;
    border:1px solid var(--line);background:var(--paper);color:var(--ink);
    border-radius:0;-webkit-appearance:none;font-family:var(--sans);}
  .field.has-pre input{padding-left:26px;}
  .setting input:focus,.setting select:focus{outline:none;border-color:var(--ink);background:#fff;}
  .setting .hint{font-size:11.5px;color:var(--muted);margin-top:6px;
    font-style:italic;font-family:var(--serif);}
  .setting select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%238e8573' stroke-width='1.2' fill='none'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:30px;}
  .setting .pad-bottom{height:6px;}

</style>
</head>
<body>
<header>
  <h1>Price <em>Calculator</em></h1>
  <p class="tag">Promo · MBS · GST · FX</p>
</header>

<div class="pad">
  <div class="entry">
    <label>Amount</label>
    <div class="running" id="running"></div>
    <div class="amt-row">
      <div class="amt-wrap"><span>$</span><input id="amt" type="number" inputmode="decimal" placeholder="0" value=""></div>
      <button id="plusBtn" title="Add to running total">+</button>
      <button id="addBtn">Add</button>
    </div>
    <div id="live"></div>
  </div>

  <div class="section-label">
    <span class="ttl">Ledger <em>— saved entries</em></span>
    <button id="clearBtn" class="hidden">Clear</button>
  </div>
  <div id="list"><div class="empty">Saved entries will appear here.</div></div>

  <details>
    <summary>Settings &amp; Rates <span class="arr">▾</span></summary>
    <div class="setting">
      <label>Promo — get this much off…</label>
      <div class="field has-pre"><span class="pre">$</span><input id="promoOff" type="number" inputmode="decimal" value="6"></div>
      <label>…for every this much spent</label>
      <div class="field has-pre"><span class="pre">$</span><input id="promoPer" type="number" inputmode="decimal" value="100"></div>
      <label>Promo style</label>
      <select id="promoMode">
        <option value="step">Per full increment ($6 at $100, $12 at $200)</option>
        <option value="vip">VIP — 5% off original price</option>
        <option value="none">No promo</option>
      </select>

      <label>MBS rewards rate</label>
      <div class="field"><input id="mbsRate" type="number" inputmode="decimal" value="3"><span class="suf">%</span></div>
      <div class="hint">Earned on amount ÷ 1.09 × rate</div>

      <label>GST tourist refund</label>
      <select id="refundOn">
        <option value="on">Tax Refund</option>
        <option value="off">No tax refund</option>
      </select>

      <label>Rewards &amp; refund based on</label>
      <select id="baseOn">
        <option value="after">Amount after promo discount</option>
        <option value="before">Original amount</option>
      </select>

      <label>SGD → RMB rate (¥ per S$1)</label>
      <div class="field has-pre"><span class="pre">¥</span><input id="fx" type="number" inputmode="decimal" value="5.3"></div>
      <div class="pad-bottom"></div>
    </div>
  </details>
</div>


<script>
const $=id=>document.getElementById(id);
const money=n=>(n<0?'-$':'$')+Math.abs(n).toFixed(2);
const yuan=n=>(n<0?'-¥':'¥')+Math.abs(n).toFixed(2);
let rows=[];

const STORAGE_KEY='epc-mobile-v1';
const SETTING_IDS=['promoOff','promoPer','promoMode','mbsRate','refundOn','baseOn','fx'];
let runParts=[];
function runSum(){return runParts.reduce((a,b)=>a+b,0);}
function currentAmount(){return runSum()+(+$('amt').value||0);}
function updateRunning(){
  const r=$('running');
  if(!runParts.length){r.innerHTML='';return;}
  const partsTxt=runParts.map(p=>'$'+p.toFixed(2)).join(' + ');
  r.innerHTML=`Running $${runSum().toFixed(2)} <span class="parts">= ${partsTxt} +</span><button class="clr-run" id="resetRun">Reset</button>`;
  $('resetRun').onclick=()=>{runParts=[];updateRunning();renderLive();saveState();};
}

const REFUND=[
 [100,5],[125,6],[150,8],[175,10],[200,12],[225,13],[250,14],[275,16],[300,17],[325,19],
 [350,21],[375,23],[400,25],[425,26],[450,28],[475,30],[500,33],[550,36],[600,39],[650,42],
 [700,46],[750,49],[800,52],[850,55],[900,58],[950,61],[1000,66],[1100,72],[1200,80],[1300,88],
 [1400,94],[1500,102],[1600,108],[1700,114],[1800,121],[1900,128],[2000,134],[2100,140],[2200,146],[2300,153],
 [2400,161],[2500,169],[2600,174],[2700,179],[2800,188],[2900,194],[3000,203],[3100,209],[3200,214],[3300,221],
 [3400,227],[3500,236],[3600,242],[3700,251],[3800,258],[3900,264],[4000,273],[4100,280],[4200,286],[4300,292],
 [4400,298],[4500,305],[4600,311],[4700,319],[4800,326],[4900,333],[5000,340],[5100,347],[5200,357],[5400,371],
 [5600,383],[5800,396],[6000,409],[6200,423],[6400,437],[6600,449],[6800,461],[7000,475],[7200,495],[7500,516],
 [7800,535],[8100,556],[8400,576],[8700,599],[9000,620],[9300,643],[9600,664]
];
function gstRefund(a){
  if(a<100)return 0;
  if(a>=10000){let p=a<20000?0.884:a<40000?0.894:0.904;return Math.floor(a/109*9*p);}
  let r=0;for(const[lb,v]of REFUND){if(a>=lb)r=v;else break;}return r;
}
function settings(){return{
  off:+$('promoOff').value,per:+$('promoPer').value,pmode:$('promoMode').value,
  mbs:+$('mbsRate').value/100,refund:$('refundOn').value,base:$('baseOn').value,fx:+$('fx').value
};}
function promoDisc(a,s){if(s.pmode==='none')return 0;if(s.pmode==='vip')return a*0.05;if(s.per<=0||s.off<=0)return 0;return Math.floor(a/s.per)*s.off;}
function compute(a,s){
  const disc=promoDisc(a,s),after=a-disc,base=s.base==='after'?after:a;
  const mbs=base/1.09*s.mbs,refund=s.refund==='on'?gstRefund(base):0;
  const net=after-mbs-refund,saved=a-net,netRmb=net*s.fx;
  return{a,disc,after,mbs,refund,net,saved,netRmb};
}
function promoLabel(s){
  if(s.pmode==='none')return 'none';
  if(s.pmode==='vip')return 'VIP 5%';
  return '$'+s.off+' off per $'+s.per;
}
function mbsLabel(s){return (s.mbs*100).toFixed(1).replace(/\.0$/,'')+'%';}
function refundLabel(s){return s.refund==='on'?'YES':'NO';}
function settingsNote(s){
  return 'Promo: '+promoLabel(s)+' · MBS '+mbsLabel(s)+' · GST refund '+refundLabel(s)+' · FX ¥'+s.fx+'/S$1';
}
function saveState(){
  try{
    const blob={
      settings:Object.fromEntries(SETTING_IDS.map(id=>[id,$(id).value])),
      rows:rows,
      amt:$('amt').value,
      runParts:runParts
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(blob));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const stored=JSON.parse(raw);
    if(stored&&stored.settings&&!stored.fxDefault53){
      stored.settings.fx='5.3';
      stored.fxDefault53=true;
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(stored));}catch(e){}
    }
    if(stored&&stored.settings){
      SETTING_IDS.forEach(id=>{
        if(stored.settings[id]!=null)$(id).value=stored.settings[id];
      });
    }
    if(stored&&Array.isArray(stored.rows))rows=stored.rows.filter(r=>r&&typeof r.amount==='number');
    if(stored&&typeof stored.amt==='string')$('amt').value=stored.amt;
    if(stored&&Array.isArray(stored.runParts))runParts=stored.runParts.filter(n=>typeof n==='number'&&n>0);
  }catch(e){}
}
function renderLive(){
  const v=currentAmount(), box=$('live');
  if(!(v>0)){box.innerHTML='';saveState();return;}
  const s=settings();
  const r=compute(v,s);
  const pc=r.a>0?(r.saved/r.a*100).toFixed(1):'0';
  box.innerHTML=`<div class="live-box">
    <div class="live-top">
      <div><span class="lbl">Real cost of ${money(r.a)}</span><div class="v">${money(r.net)}</div></div>
      <div class="rmb">${yuan(r.netRmb)}</div>
    </div>
    <div class="live-brk">
      ${r.disc>0?`<span>Promo <span class="s">(${promoLabel(s)})</span> <b>−${money(r.disc)}</b></span>`:''}
      <span>MBS <span class="s">(${mbsLabel(s)})</span> <b>−${money(r.mbs)}</b></span>
      <span>GST <span class="s">(${refundLabel(s)})</span> <b>−${money(r.refund)}</b></span>
      <span>Saved <b>${money(r.saved)} · ${pc}%</b></span>
      <span>FX <span class="s">(¥${s.fx})</span></span>
    </div>
    <button class="pin" id="pinBtn">Save to ledger</button>
  </div>`;
  $('pinBtn').onclick=()=>{rows.push({amount:v,...settings()});runParts=[];$('amt').value='';$('amt').blur();updateRunning();renderLive();render();};
  saveState();
}
function render(){
  const L=$('list');
  if(!rows.length){L.innerHTML='<div class="empty">Saved entries will appear here.</div>';$('clearBtn').classList.add('hidden');saveState();return;}
  let h='';
  for(let i=rows.length-1;i>=0;i--){
    const row=rows[i];
    const r=compute(row.amount,row);
    const pc=r.a>0?(r.saved/r.a*100).toFixed(1):'0';
    h+=`<div class="rcard">
      <div class="rcard-head">
        <span class="num"><b>No.</b>${String(i+1).padStart(2,'0')}</span>
        <button class="del" data-i="${i}">Remove</button>
      </div>
      <div class="top">
        <div class="spent"><span class="lbl">Original price</span><b>${money(r.a)}</b></div>
        <div class="saved-box"><span class="lbl">Total saved</span><div class="v">${money(r.saved)} <span class="pc">${pc}%</span></div></div>
      </div>
      <div class="breakdown">
        ${r.disc>0?`<div class="brow"><span class="k">Promo discount <span class="s">(${promoLabel(row)})</span></span><span class="val">−${money(r.disc)}</span></div>`:''}
        <div class="brow"><span class="k">MBS rewards <span class="s">(${mbsLabel(row)})</span></span><span class="val">−${money(r.mbs)}</span></div>
        <div class="brow"><span class="k">GST refund <span class="s">(${refundLabel(row)})</span></span><span class="val">−${money(r.refund)}</span></div>
      </div>
      <div class="final">
        <div class="lbl">Final Price</div>
        <div class="v">${money(r.net)}</div>
        <div class="rmb">${yuan(r.netRmb)}<span class="fx">FX ¥${row.fx}</span></div>
      </div>
    </div>`;
  }
  L.innerHTML=h;
  L.querySelectorAll('.del').forEach(b=>b.onclick=()=>{rows.splice(+b.dataset.i,1);render();});
  $('clearBtn').classList.remove('hidden');
  saveState();
}
$('addBtn').onclick=()=>{const v=currentAmount();if(v>0){rows.push({amount:v,...settings()});runParts=[];$('amt').value='';$('amt').blur();updateRunning();renderLive();render();}};
$('plusBtn').onclick=()=>{const v=+$('amt').value;if(v>0){runParts.push(v);$('amt').value='';updateRunning();renderLive();$('amt').focus();saveState();}};
$('amt').addEventListener('input',renderLive);
$('amt').addEventListener('keyup',renderLive);
$('amt').addEventListener('keydown',e=>{if(e.key==='Enter')$('addBtn').click();if(e.key==='+'){e.preventDefault();$('plusBtn').click();}});
SETTING_IDS.forEach(id=>$(id).addEventListener('input',()=>{renderLive();render();}));
$('clearBtn').onclick=()=>{rows=[];render();};
loadState();
updateRunning();
renderLive();
render();
</script>
</body>
</html>
